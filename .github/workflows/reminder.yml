name: Email Reminder Cron

on:
  schedule:
    # Runs daily at 9:00 AM Malaysia time (UTC+8) = 1:00 AM UTC
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  run-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run reminder
        env:
          REMIND_DAYS: ${{ secrets.REMIND_DAYS }}
          TEST_MODE: ${{ secrets.TEST_MODE }}
          TEST_TO_EMAIL: ${{ secrets.TEST_TO_EMAIL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          RETRY_MAX: ${{ secrets.RETRY_MAX }}
          RETRY_BACKOFF_SECONDS: ${{ secrets.RETRY_BACKOFF_SECONDS }}
          SENT_LOG_FILE: state/sent_log.json
          DATA_FILE: data/clients.xlsx
          LOG_DIR: logs
          REPORT_DIR: reports
        run: python src/main.py

      - name: Upload logs/reports/state
        uses: actions/upload-artifact@v4
        with:
          name: run-artifacts
          path: |
            logs/
            reports/
            state/